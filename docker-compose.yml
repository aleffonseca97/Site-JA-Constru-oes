# Usa o mesmo DATABASE_URL no build (Next/Prisma nas páginas) e em runtime.
# Coloque DATABASE_URL no .env na raiz do projeto (o Compose usa esse ficheiro para ${DATABASE_URL}).
#
#   docker compose build app
#   docker compose up app

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        DATABASE_URL: ${DATABASE_URL:?Defina DATABASE_URL no .env (ou export) antes de buildar}
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: ${DATABASE_URL:?Defina DATABASE_URL no .env ou no ambiente}
    env_file:
      - path: .env
        required: false
