# Primeira vez (o build do Next precisa de Postgres acessível — páginas RSC usam Prisma no build):
#   1. docker compose up -d db
#   2. docker compose build app
#   3. docker compose up app
#
# Em Linux, extra_hosts no build permite host.docker.internal → host (Postgres na porta publicada).

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ja
      POSTGRES_PASSWORD: ja
      POSTGRES_DB: jaconstrucoes
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ja -d jaconstrucoes"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        DATABASE_URL: postgresql://ja:ja@host.docker.internal:5432/jaconstrucoes?sslmode=disable
      extra_hosts:
        - "host.docker.internal:host-gateway"
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://ja:ja@db:5432/jaconstrucoes?sslmode=disable
    env_file:
      - path: .env
        required: false
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
