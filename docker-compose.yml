# Build args: DATABASE_URL (Prisma) e NEXT_PUBLIC_R2_PUBLIC_URL (Next Image / remotePatterns).
# O Compose substitui a partir do .env na pasta do projeto; .env não entra no contexto da build (.dockerignore).
#
# Runtime: DATABASE_URL via environment + env_file .env no serviço.
#
# Postgres no HOST: use host.docker.internal na URL, não localhost (ver extra_hosts).
# Postgres noutro container/servidor: hostname/IP acessível a partir da rede da build.
#
#   docker compose build app
#   docker compose up app

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      extra_hosts:
        - 'host.docker.internal:host-gateway'
      args:
        DATABASE_URL: ${DATABASE_URL}
        NEXT_PUBLIC_R2_PUBLIC_URL: ${NEXT_PUBLIC_R2_PUBLIC_URL}
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: ${DATABASE_URL}
    env_file:
      - path: .env
        required: false
    volumes:
      # Persiste ficheiros em public/ (imagens estáticas e futuros uploads). Na primeira subida,
      # o Docker preenche o volume a partir do conteúdo copiado na imagem.
      - public_images:/app/public

volumes:
  public_images:
