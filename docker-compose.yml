# Build: DATABASE_URL passa por build.args; o Compose preenche com ${DATABASE_URL} (ficheiro .env
# na pasta do projeto para substituição — não entra no contexto da imagem, .env está no .dockerignore).
#
# Runtime: DATABASE_URL via environment + env_file .env no serviço.
#
# Postgres no HOST: use host.docker.internal na URL, não localhost (ver extra_hosts).
# Postgres noutro container/servidor: hostname/IP acessível a partir da rede da build.
#
#   docker compose build app
#   docker compose up app

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      extra_hosts:
        - 'host.docker.internal:host-gateway'
      args:
        DATABASE_URL: ${DATABASE_URL}
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: ${DATABASE_URL}
    env_file:
      - path: .env
        required: false
    volumes:
      # Persiste ficheiros em public/ (imagens estáticas e futuros uploads). Na primeira subida,
      # o Docker preenche o volume a partir do conteúdo copiado na imagem.
      - public_images:/app/public

volumes:
  public_images:
